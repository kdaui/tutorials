<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            position: relative;
        }
        .error-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 600px;
            width: 80%;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        .error-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: var(--light-accent);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(94, 138, 191, 0.5);
        }
        .error-message {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        .error-numbers {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: var(--light-accent);
            margin-bottom: 2rem;
            letter-spacing: 4px;
        }
        .back-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--accent-blue);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: var(--light-accent);
        }
    </style>
</head>
<body>
    <img src="images/rei.png" alt="" class="error-bg">
    <div class="error-container">
        <div class="error-code">404</div>
        <p class="error-message">ACHTUNG ACHTUNG</p>
        <p class="error-numbers">87004 25631 74389 01247 55923 81690 37461 92058 43271 68905</p>
        <p class="error-message">ENDE ENDE</p>
        <a href="index.html" class="back-link">Go Home</a>
    </div>
</body>
</html>
